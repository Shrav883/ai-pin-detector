<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
    }
    h3 { margin: 0 0 12px; font-size: 15px; }
    label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    select { margin-top: 10px; width: 100%; padding: 4px; font-size: 13px; }
    p { font-size: 12px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>AI Pin Detector</h3>

  <label>
    <input type="checkbox" id="enabled" checked>
    Enable detection
  </label>

  <select id="mode">
    <option value="blur">Blur AI pins</option>
    <option value="label">Label only</option>
    <option value="hide">Hide AI pins</option>
  </select>

  <p id="status">Loading...</p>

  <script src="popup.js"></script>
</body>
</html>
